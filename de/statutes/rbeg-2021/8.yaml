  summary: 'RBEG § 8: die Regelbedarfsstufen zum 1. Januar 2021 (446/401/357/373/309/283 €). Dies sind die gesetzlichen Basiswerte 2021; die für 2025 geltenden fortgeschriebenen Beträge (Regelbedarfsstufe 1 = 563 €) ergeben sich aus der Regelbedarfsstufen-Fortschreibungsverordnung 2025, die NICHT in dieser Corpus-Release enthalten ist (bulk/ENCODING-GAPS.md).'
