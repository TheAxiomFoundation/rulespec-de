  kind: parameter
  dtype: Money
  unit: EUR
  source: BKGG § 6a Abs. 1 Nr. 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: de/statute/bkgg-1996/6a
          excerpt: in Höhe von mindestens 900 Euro
  versions:
  - effective_from: '0001-01-01'
    formula: '900'
