format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: de/statute/bkgg-1996/6a
  summary: 'BKGG § 6a (Kinderzuschlag): Mindesteinkommen der Eltern 900 € (600 € Alleinerziehende) (Absatz 1 Nr. 2); Sofortzuschlag 25 € (Absatz 2); Minderung um 45 % des zu berücksichtigenden Kindeseinkommens (Absatz 3); Vermögensfreigrenzen 40.000 € / 15.000 € (Absatz 3). Der Höchstbetrag ist an das sächliche Existenzminimum gekoppelt (297 € in 2025) und nicht in dieser Release enthalten (bulk/ENCODING-GAPS.md).'
rules:
