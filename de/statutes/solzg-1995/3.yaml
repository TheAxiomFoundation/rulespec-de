  source_verification:
    corpus_citation_path: de/statute/solzg-1995/3
  summary: 'SolzG 1995 § 3 Absatz 3 (Freigrenze): Der Solidaritätszuschlag wird nur erhoben, wenn die Bemessungsgrundlage 40 700 Euro (Splitting, § 32a Abs. 5/6 EStG) bzw. 20 350 Euro (andere Fälle) übersteigt. Encodiert sind die Jahres-Freigrenzen des aktuellen (2026er) Textes; die Lohnzahlungszeitraum-Umrechnung (Absatz 4) ist nicht Teil der Jahresparität. Die 2025er Freigrenzen (19.950/39.900 €) sind in dieser Release nicht enthalten (bulk/ENCODING-GAPS.md).'
