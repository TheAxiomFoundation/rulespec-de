    corpus_citation_path: de/statute/sgb-6/287
  summary: '§ 287 SGB VI (Beitragssatzgarantie bis 2025): Der Beitragssatz der allgemeinen Rentenversicherung ist bis zum Jahr 2025 auf mindestens 18,6 Prozent festzusetzen (Absatz 1 Satz 2). Der operative Jahresbeitragssatz wird durch Rechtsverordnung nach § 160 SGB VI (Beitragssatzverordnung, in dieser Corpus-Release nicht enthalten) festgesetzt und beträgt für 2025 eben diesen Mindestwert von 18,6 Prozent. Encodiert ist der gesetzliche Mindestbeitragssatz.'
