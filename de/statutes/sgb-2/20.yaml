  summary: 'SGB II § 20 (Regelbedarf): Alleinstehende/Alleinerziehende erhalten Regelbedarfsstufe 1; sonstige erwerbsfähige Angehörige unter 18 Jahren Regelbedarfsstufe 4, sonst Regelbedarfsstufe 3 (Absatz 2); zwei volljährige Partner je Regelbedarfsstufe 2 (Absatz 4). Encodiert ist die Altersgrenze der Stufenzuordnung; die Beträge stehen in RBEG/RBSFV.'
