  summary: 'EStG § 9a (Pauschbeträge für Werbungskosten): Arbeitnehmer-Pauschbetrag 1.230 Euro für Einnahmen aus nichtselbständiger Arbeit (Satz 1 Nr. 1 Buchst. a) und Pauschbetrag 102 Euro für Versorgungsbezüge (Buchst. b). Encodiert sind die gesetzlichen Pauschbeträge des aktuellen Textes.'
