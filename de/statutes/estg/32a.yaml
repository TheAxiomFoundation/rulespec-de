  summary: 'EStG § 32a (Einkommensteuertarif), Fassung ab dem Veranlagungszeitraum 2026: Grundfreibetrag 12 348 Euro und die Tarifzonen-Obergrenzen 17 799 / 69 878 / 277 825 Euro. Die vollständige progressive Tarifformel (Zusatzkonstanten 1 400 / 2 397 / 1 034,87 / 11 135,63 / 19 470,38 und Grenzsteuersätze 0,42 / 0,45) ist NICHT encodiert: diese Konstanten stehen zwar wörtlich in Absatz 1, werden aber vom numerischen Grounding-Extraktor wegen der deutschen Tausender-Leerzeichen und der «•»-Multiplikation nicht erkannt (siehe bulk/ENCODING-GAPS.md). Encodiert sind die grundfähigen Zonengrenzen des 2026er Textes; die 2025er Konstanten (Grundfreibetrag 12 096 Euro u.a.) sind ohnehin nicht in dieser Release.'
