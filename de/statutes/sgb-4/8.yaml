  summary: '§ 8 SGB IV (Geringfügigkeitsgrenze/Minijob): Die Geringfügigkeitsgrenze wird berechnet, indem der Mindestlohn mit 130 vervielfacht, durch drei geteilt und auf volle Euro aufgerundet wird (Absatz 1a). Encodiert ist der gesetzliche Multiplikator 130; der Mindestlohn und der daraus vom BMAS im Bundesanzeiger bekanntgegebene Grenzwert (556 € in 2025) sind nicht Teil dieser Release (bulk/ENCODING-GAPS.md).'
